<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SnipKeep — voice note</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #100D08;
        color: #EAE8E3;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      }
      .card {
        max-width: 380px;
        padding: 32px;
        text-align: center;
      }
      @keyframes voice-pulse {
        0%, 100% { box-shadow: 0 0 0 0 rgba(246, 225, 43, 0.35); }
        50%      { box-shadow: 0 0 0 10px rgba(246, 225, 43, 0); }
      }
      .mic {
        width: 48px;
        height: 48px;
        border-radius: 50%;
        background: rgba(246, 225, 43, 0.14);
        color: #F6E12B;
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 0 auto 20px;
        font-size: 22px;
      }
      .mic.listening { animation: voice-pulse 1.6s ease-out infinite; }
      @media (prefers-reduced-motion: reduce) {
        .mic.listening { animation: none; }
      }
      h1 { font-size: 16px; font-weight: 700; margin: 0 0 8px; }
      p { font-size: 14px; color: #ADA9A1; line-height: 1.6; margin: 0; }
      #transcript {
        margin-top: 18px;
        font-size: 14px;
        color: #EAE8E3;
        min-height: 20px;
        line-height: 1.5;
      }
      .status { margin-top: 14px; font-size: 14px; font-weight: 600; min-height: 18px; }
      .status.err { color: #FF8A8A; }
    </style>
  </head>
  <body>
    <div class="card">
      <div id="mic" class="mic">🎙</div>
      <h1 id="heading">Allow microphone access</h1>
      <p id="hint">SnipKeep needs this once to transcribe spoken notes. Chrome's own permission prompt should appear.</p>
      <div id="transcript"></div>
      <div id="status" class="status"></div>
    </div>
    <script type="module" src="./index.ts"></script>
  </body>
</html>
