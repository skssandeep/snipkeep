<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SnipKeep — allow microphone access</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #0E0C14;
        color: #F2F1F5;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      }
      .card {
        max-width: 360px;
        padding: 32px;
        text-align: center;
      }
      .mic {
        width: 48px;
        height: 48px;
        border-radius: 50%;
        background: rgba(169, 156, 255, 0.14);
        color: #A99CFF;
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 0 auto 20px;
        font-size: 22px;
      }
      h1 { font-size: 16px; font-weight: 700; margin: 0 0 8px; }
      p { font-size: 13px; color: #A8A4B5; line-height: 1.6; margin: 0; }
      .status { margin-top: 18px; font-size: 12.5px; font-weight: 600; min-height: 18px; }
      .status.ok { color: #A99CFF; }
      .status.err { color: #FF8A8A; }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="mic">🎙</div>
      <h1>Allow microphone access</h1>
      <p>SnipKeep needs this once to transcribe spoken notes. Chrome's own permission prompt should appear — after allowing it, you can close this tab and try the mic button again.</p>
      <div id="status" class="status"></div>
    </div>
    <script type="module" src="./index.ts"></script>
  </body>
</html>
